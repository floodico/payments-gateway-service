services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
      POSTGRES_DB: payments_gateway
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payments -d payments_gateway']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: payments
      DB_PASSWORD: payments
      DB_NAME: payments_gateway
      JWT_SECRET: local_jwt_hmac_key
      JWT_EXPIRES_IN: 1h
      WEBHOOK_SIGNATURE_SECRET: local_webhook_hmac_stub
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
